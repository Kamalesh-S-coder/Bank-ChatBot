<!DOCTYPE html>
<html>
<head>

<title>Bank Dashboard</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500&display=swap" rel="stylesheet">

<style>

body{
font-family:Poppins;
background:#f4f6fb;
margin:0;
padding:40px;
}

h2{
color:#1e3c72;
}

/* CHAT BUTTON */

.chat-btn{
position:fixed;
bottom:20px;
right:20px;
width:60px;
height:60px;
border-radius:50%;
background:#1e3c72;
color:white;
font-size:28px;
display:flex;
justify-content:center;
align-items:center;
cursor:pointer;
box-shadow:0 5px 20px rgba(0,0,0,0.3);
}

/* CHATBOX */

.chatbox{
position:fixed;
bottom:90px;
right:20px;
width:320px;
height:420px;
background:white;
border-radius:12px;
box-shadow:0 5px 20px rgba(0,0,0,0.2);
display:none;
flex-direction:column;
}

.chat-header{
background:#1e3c72;
color:white;
padding:12px;
border-radius:12px 12px 0 0;
}

.chat-messages{
flex:1;
padding:10px;
overflow-y:auto;
}

.user{
text-align:right;
color:#1e3c72;
margin:5px 0;
}

.bot{
text-align:left;
color:#333;
margin:5px 0;
}

.chat-input{
display:flex;
border-top:1px solid #ddd;
}

.chat-input input{
flex:1;
padding:10px;
border:none;
outline:none;
}

.chat-input button{
background:#1e3c72;
color:white;
border:none;
padding:10px 15px;
cursor:pointer;
}

.logout{
position:absolute;
top:20px;
right:20px;
text-decoration:none;
color:#1e3c72;
}

</style>
</head>

<body>

<a class="logout" href="/logout">Logout</a>

<h2>Welcome {{username}} 👋</h2>
<p>Your banking dashboard is active.</p>


<div class="chat-btn" onclick="toggleChat()">💬</div>


<div class="chatbox" id="chatbox">

<div class="chat-header">
Bank Assistant
</div>


<div class="chat-messages">

{% for sender,message in chat_history %}

<div class="{{ 'user' if sender=='You' else 'bot' }}">
<b>{{sender}}:</b> {{message}}
</div>

{% endfor %}

</div>


<form method="POST" action="/chatbot" class="chat-input">

<input type="text" name="message" placeholder="Type message..." required>

<button type="submit">Send</button>

</form>

</div>


<script>

function toggleChat(){
    let box = document.getElementById("chatbox");

    if(box.style.display === "flex"){
        box.style.display = "none";
        localStorage.setItem("chatOpen","false");
    }else{
        box.style.display = "flex";
        localStorage.setItem("chatOpen","true");
    }
}


window.onload = function(){

    if(localStorage.getItem("chatOpen") === "true"){
        document.getElementById("chatbox").style.display="flex";
    }

}

</script>
