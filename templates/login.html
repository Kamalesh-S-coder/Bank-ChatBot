<!DOCTYPE html>
<html>
<head>
<title>Bank Login</title>

<style>

body{
font-family:Poppins;
background:linear-gradient(135deg,#1e3c72,#2a5298);
height:100vh;
display:flex;
justify-content:center;
align-items:center;
}

.box{
background:white;
padding:40px;
border-radius:10px;
width:320px;
box-shadow:0 10px 30px rgba(0,0,0,0.2);
}

h2{
text-align:center;
margin-bottom:20px;
}

input{
width:100%;
padding:10px;
margin:10px 0;
border:1px solid #ccc;
border-radius:5px;
}

button{
width:100%;
padding:10px;
background:#1e3c72;
color:white;
border:none;
border-radius:5px;
cursor:pointer;
}

button:hover{
background:#16325c;
}

.error{
color:red;
text-align:center;
}

</style>
</head>

<body>

<div class="box">

<h2>Bank Login</h2>

{% if error %}
<p class="error">{{error}}</p>
{% endif %}

<form method="POST">

<input type="text" name="username" placeholder="Username" required>

<input type="password" name="password" placeholder="Password" required>

<button type="submit">Login</button>

</form>

</div>

</body>
</html>
